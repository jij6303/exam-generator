{% extends "base.html" %}
{% block title %}로그인{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h4 class="card-title mb-4 text-center">로그인</h4>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">이름</label>
            <input type="text" name="username" class="form-control" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label">PIN (4자리)</label>
            <input type="password" name="pin" class="form-control" required
                   maxlength="4" pattern="\d{4}" inputmode="numeric" placeholder="숫자 4자리">
          </div>
          <div class="mb-3 form-check">
            <input type="checkbox" name="remember" class="form-check-input" id="remember">
            <label class="form-check-label" for="remember">로그인 상태 유지</label>
          </div>
          <button type="submit" class="btn btn-primary w-100">로그인</button>
        </form>
        <hr>
        <p class="text-center mb-0">계정이 없으신가요?
          <a href="{{ url_for('auth.register') }}">회원가입</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
