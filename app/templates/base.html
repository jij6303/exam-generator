<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}시험문제 생성기{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand fw-bold" href="{{ url_for('exam.dashboard') }}">ExamGen</a>
    <div class="ms-auto">
      {% if current_user.is_authenticated %}
        <span class="navbar-text text-white me-3">{{ current_user.username }}</span>
        <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-light btn-sm">로그아웃</a>
      {% else %}
        <a href="{{ url_for('auth.login') }}" class="btn btn-outline-light btn-sm me-2">로그인</a>
        <a href="{{ url_for('auth.register') }}" class="btn btn-light btn-sm">회원가입</a>
      {% endif %}
    </div>
  </div>
</nav>

<div class="container py-4">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
